<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flip Clock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #FFFFFF;
      --card-bg: #F4F4F4;
      --text-primary: #37352F;
      --text-secondary: rgba(55, 53, 47, 0.6);
      --divider-color: rgba(55, 53, 47, 0.09);
      --border-color: rgba(55, 53, 47, 0.09);
      --clock-padding: 24px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #191919;
        --card-bg: #222222;
        --text-primary: #D4D4D4;
        --text-secondary: rgba(255, 255, 255, 0.4);
        --divider-color: rgba(255, 255, 255, 0.1);
        --border-color: rgba(255, 255, 255, 0.1);
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background-color: var(--bg-color);
      overflow: hidden;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Outer widget card — full size when standalone, inset when embedded */
    .clock-card {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: var(--bg-color);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      padding: var(--clock-padding);
      border-radius: 0;
      border: none;
      position: relative;
      transition: border-radius 0.2s ease;
    }

    /*
     * When embedded in an iframe, JS adds .is-embedded to <body>.
     * Only then do we show the outer border + 12px corner rounding.
     */
    body.is-embedded .clock-card {
      width: calc(100% - 4px);
      height: calc(100% - 4px);
      border: 1px solid var(--border-color);
      border-radius: 12px;
    }

    /* ── Flip number cards ──────────────────────────── */
    .clock-wrapper {
      display: flex;
      gap: 0.15em;
      align-items: center;
      justify-content: center;
      font-size: 100px;
      line-height: 1;
    }

    .flip-card {
      position: relative;
      width: 1.8em;
      height: 2em;
      perspective: 1000px;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      background-color: var(--card-bg);
      box-sizing: content-box;
      overflow: hidden;
      transform: translateZ(0);
      will-change: transform;
    }

    .card-half {
      position: absolute;
      left: 0;
      width: 100%;
      height: 50%;
      overflow: hidden;
      background-color: var(--card-bg);
      user-select: none;
      -webkit-user-select: none;
    }

    .card-top {
      top: 0;
      border-top-left-radius: 12px;
      border-top-right-radius: 12px;
    }

    .card-bottom {
      bottom: 0;
      border-bottom-left-radius: 12px;
      border-bottom-right-radius: 12px;
    }

    .card-content {
      position: absolute;
      left: 0;
      width: 100%;
      height: 2em;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card-top .card-content { top: 0; }
    .card-bottom .card-content { bottom: 0; }

    .num {
      font-size: 1.25em;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: var(--text-primary);
    }

    .ampm-label {
      position: absolute;
      top: 0.16em;
      left: 0.16em;
      font-size: 0.18em;
      font-weight: 600;
      color: var(--text-secondary);
      z-index: 10;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      user-select: none;
      -webkit-user-select: none;
    }

    .card-divider {
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      height: 1px;
      background-color: var(--divider-color);
      z-index: 5;
    }

    /* ── Flip animation ─────────────────────────────── */
    .flap-top {
      top: 0;
      transform-origin: bottom center;
      z-index: 3;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s ease;
    }

    .flap-bottom {
      bottom: 0;
      transform-origin: top center;
      z-index: 2;
      transform: rotateX(90deg);
      opacity: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s ease;
    }

    .flip-card.flipping .flap-top {
      transform: rotateX(-90deg);
      opacity: 0;
    }

    .flip-card.flipping .flap-bottom {
      transform: rotateX(0deg);
      opacity: 1;
      z-index: 4;
    }

    /* ── Fullscreen hover button (bottom-right corner) ── */
    .fullscreen-btn {
      position: absolute;
      bottom: 10px;
      right: 10px;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      cursor: pointer;
      opacity: 0;
      transform: scale(0.85);
      transition: opacity 0.18s ease, transform 0.18s ease, background-color 0.15s ease;
      z-index: 20;
      /* Only visible when embedded */
      pointer-events: none;
    }

    body.is-embedded .fullscreen-btn {
      pointer-events: auto;
    }

    .clock-card:hover .fullscreen-btn {
      opacity: 1;
      transform: scale(1);
    }

    .fullscreen-btn:hover {
      background-color: var(--card-bg);
    }

    .fullscreen-btn svg {
      width: 14px;
      height: 14px;
      stroke: var(--text-secondary);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 0.15s ease;
    }

    .fullscreen-btn:hover svg {
      stroke: var(--text-primary);
    }

    /* Tooltip label */
    .fullscreen-btn::after {
      content: 'Open full screen';
      position: absolute;
      bottom: calc(100% + 6px);
      right: 0;
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
      padding: 4px 8px;
      border-radius: 6px;
      pointer-events: none;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    .fullscreen-btn:hover::after {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="clock-card">
    <div class="clock-wrapper">
      <!-- Hours Card -->
      <div class="flip-card" id="hours-card">
        <div class="ampm-label" id="ampm">AM</div>
        <div class="card-half card-top static">
          <div class="card-content"><span class="num">12</span></div>
        </div>
        <div class="card-half card-bottom static">
          <div class="card-content"><span class="num">12</span></div>
        </div>
        <div class="card-half card-top flap-top">
          <div class="card-content"><span class="num">12</span></div>
        </div>
        <div class="card-half card-bottom flap-bottom">
          <div class="card-content"><span class="num">12</span></div>
        </div>
        <div class="card-divider"></div>
      </div>

      <!-- Minutes Card -->
      <div class="flip-card" id="minutes-card">
        <div class="card-half card-top static">
          <div class="card-content"><span class="num">00</span></div>
        </div>
        <div class="card-half card-bottom static">
          <div class="card-content"><span class="num">00</span></div>
        </div>
        <div class="card-half card-top flap-top">
          <div class="card-content"><span class="num">00</span></div>
        </div>
        <div class="card-half card-bottom flap-bottom">
          <div class="card-content"><span class="num">00</span></div>
        </div>
        <div class="card-divider"></div>
      </div>
    </div>

    <!-- Fullscreen button — only interactive when embedded -->
    <button class="fullscreen-btn" id="fullscreen-btn" aria-label="Open full screen">
      <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
        <polyline points="10,2 14,2 14,6"/>
        <polyline points="6,14 2,14 2,10"/>
        <line x1="14" y1="2" x2="9" y2="7"/>
        <line x1="2" y1="14" x2="7" y2="9"/>
      </svg>
    </button>
  </div>

  <script>
    /* ── Embed detection ────────────────────────────── */
    const isEmbedded = window.self !== window.top;
    if (isEmbedded) {
      document.body.classList.add('is-embedded');
    }

    /* ── Fullscreen button ──────────────────────────── */
    document.getElementById('fullscreen-btn').addEventListener('click', () => {
      window.open(window.location.href, '_blank', 'noopener,noreferrer');
    });

    /* ── Clock logic ────────────────────────────────── */
    function formatTime(val) {
      return val.toString().padStart(2, '0');
    }

    function updateCard(cardElement, newValue) {
      const currentValue = cardElement.getAttribute('data-value');
      if (currentValue === newValue) return;

      cardElement.setAttribute('data-value', newValue);

      const staticTop    = cardElement.querySelector('.card-top.static .num');
      const staticBottom = cardElement.querySelector('.card-bottom.static .num');
      const flapTop      = cardElement.querySelector('.flap-top .num');
      const flapBottom   = cardElement.querySelector('.flap-bottom .num');

      if (!currentValue) {
        staticTop.textContent = staticBottom.textContent =
          flapTop.textContent = flapBottom.textContent = newValue;
        return;
      }

      staticTop.textContent    = newValue;
      staticBottom.textContent = currentValue;
      flapTop.textContent      = currentValue;
      flapBottom.textContent   = newValue;

      cardElement.classList.remove('flipping');
      void cardElement.offsetWidth;
      cardElement.classList.add('flipping');

      setTimeout(() => {
        staticBottom.textContent =
          flapTop.textContent = flapBottom.textContent = newValue;
        cardElement.classList.remove('flipping');
      }, 250);
    }

    function updateClock() {
      const now  = new Date();
      let hours  = now.getHours();
      const ampm = hours >= 12 ? 'PM' : 'AM';
      hours      = hours % 12 || 12;

      updateCard(document.getElementById('hours-card'),   formatTime(hours));
      updateCard(document.getElementById('minutes-card'), formatTime(now.getMinutes()));

      const el = document.getElementById('ampm');
      if (el.textContent !== ampm) el.textContent = ampm;
    }

    /* ── Responsive scaling ─────────────────────────── */
    const wrapper = document.querySelector('.clock-wrapper');
    function resizeClock() {
      const rootStyle = getComputedStyle(document.documentElement);
      const padding   = parseFloat(rootStyle.getPropertyValue('--clock-padding')) || 24;
      const inset     = isEmbedded ? 4 : 0;
      const width     = (document.documentElement.clientWidth  || window.innerWidth)  - padding * 2 - inset;
      const height    = (document.documentElement.clientHeight || window.innerHeight) - padding * 2 - inset;

      const targetSize = Math.floor(Math.min(width * 0.92 / 3.75, height * 0.92 / 2.0));
      wrapper.style.fontSize = `${targetSize}px`;
    }

    if (window.ResizeObserver) {
      new ResizeObserver(resizeClock).observe(document.body);
    } else {
      window.addEventListener('resize', resizeClock);
    }

    updateClock();
    resizeClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
